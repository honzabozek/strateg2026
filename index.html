<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#050505">
    <title>STRATÉG 2026 PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&family=Space+Grotesk:wght@700;900&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
            color: #e5e5e5; 
            font-family: 'JetBrains Mono', monospace;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }
        
        /* Animated background grid */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(16, 185, 129, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(16, 185, 129, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: gridMove 20s linear infinite;
            pointer-events: none;
            z-index: 0;
        }
        
        @keyframes gridMove {
            0% { transform: translate(0, 0); }
            100% { transform: translate(50px, 50px); }
        }
        
        .container { position: relative; z-index: 1; }
        
        .glass {
            background: rgba(15, 15, 15, 0.85);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }
        
        .card {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            border-left: 3px solid #27272a;
            position: relative;
            overflow: hidden;
        }
        
        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, transparent 0%, rgba(16, 185, 129, 0.05) 100%);
            opacity: 0;
            transition: opacity 0.4s ease;
        }
        
        .card:hover::before { opacity: 1; }
        .card:hover { transform: translateX(4px); }
        
        .buy-border { 
            border-left-color: #10b981 !important; 
            box-shadow: -10px 0 30px -15px rgba(16, 185, 129, 0.5);
            animation: pulseGreen 2s ease-in-out infinite;
        }
        
        .sell-border { 
            border-left-color: #ef4444 !important; 
            box-shadow: -10px 0 30px -15px rgba(239, 68, 68, 0.5);
            animation: pulseRed 2s ease-in-out infinite;
        }
        
        @keyframes pulseGreen {
            0%, 100% { box-shadow: -10px 0 30px -15px rgba(16, 185, 129, 0.3); }
            50% { box-shadow: -10px 0 40px -10px rgba(16, 185, 129, 0.6); }
        }
        
        @keyframes pulseRed {
            0%, 100% { box-shadow: -10px 0 30px -15px rgba(239, 68, 68, 0.3); }
            50% { box-shadow: -10px 0 40px -10px rgba(239, 68, 68, 0.6); }
        }
        
        .input-dark {
            background: rgba(17, 17, 17, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            color: white;
            padding: 10px 12px;
            font-size: 13px;
            outline: none;
            width: 100%;
            transition: all 0.3s ease;
            font-family: 'JetBrains Mono', monospace;
        }
        
        .input-dark:focus {
            border-color: #3b82f6;
            background: rgba(17, 17, 17, 1);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            transition: all 0.3s ease;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(59, 130, 246, 0.4);
        }
        
        .btn-primary:active {
            transform: translateY(0);
        }
        
        .status-online { animation: statusPulse 2s ease-in-out infinite; }
        
        @keyframes statusPulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }
        
        .fade-in {
            animation: fadeIn 0.6s ease-out forwards;
            opacity: 0;
        }
        
        @keyframes fadeIn {
            to { opacity: 1; }
        }
        
        .slide-up {
            animation: slideUp 0.5s ease-out forwards;
            opacity: 0;
            transform: translateY(20px);
        }
        
        @keyframes slideUp {
            to { 
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .loading-spinner {
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top: 3px solid #3b82f6;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            display: inline-block;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .error-shake {
            animation: shake 0.5s ease-in-out;
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
        
        .rsi-indicator {
            position: relative;
            height: 6px;
            background: linear-gradient(90deg, 
                #ef4444 0%, 
                #f59e0b 30%, 
                #3b82f6 50%, 
                #f59e0b 70%, 
                #10b981 100%
            );
            border-radius: 10px;
            overflow: visible;
        }
        
        .rsi-marker {
            position: absolute;
            width: 4px;
            height: 16px;
            background: white;
            border-radius: 2px;
            top: -5px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.5);
            transition: left 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .metric-badge {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 4px 10px;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>
    <div class="container p-4 max-w-md mx-auto pb-32">

            <div>

        <!-- Management Panel -->

            </h3>
            
            <div class="space-y-6">
                <!-- Data Entry Section -->
                <div class="p-5 bg-white/5 rounded-xl space-y-4 border border-white/5">
                    <p class="text-[10px] font-bold text-zinc-400 uppercase tracking-wider">Nastavit nákupní data</p>
                    <div class="grid grid-cols-3 gap-3">
                        <select id="edit-ticker" class="input-dark" title="Ticker pro úpravu pozice">
                        </select>

                        <input type="text" id="edit-shares" placeholder="Ks (např. 2,2623)" class="input-dark">
                    </div>
                    <button onclick="saveMyData()" class="btn-primary w-full text-white text-[10px] font-black py-3 rounded-lg uppercase tracking-widest">
                        💾 Uložit na server
                    </button>

                <!-- DCA Simulator -->
                <div class="space-y-4 pt-4 border-t border-white/5">
                    <p class="text-[10px] font-bold text-zinc-400 uppercase tracking-wider">DCA Kalkulačka</p>
                    <div class="grid grid-cols-2 gap-3">
                        <select id="sim-ticker" class="input-dark py-3" title="Ticker pro DCA simulaci">
                        </select>
                        <input type="text" id="sim-amount" value="934" placeholder="Částka $" class="input-dark py-3">
                    </div>
                    <button onclick="runProSimulation()" class="w-full bg-zinc-800 text-white font-black py-4 rounded-xl text-[10px] uppercase tracking-[0.2em] hover:bg-zinc-700 transition-all">
                        📊 Vypočítat Break-Even
                    </button>
                    <div id="sim-output" class="hidden p-5 bg-blue-600/10 border border-blue-500/20 rounded-2xl text-[11px] text-blue-100"></div>
                </div>

                <!-- Refresh Button -->
                <button onclick="forceRefresh()" class="w-full bg-emerald-600/20 text-emerald-400 font-black py-3 rounded-xl text-[10px] uppercase tracking-widest hover:bg-emerald-600 hover:text-white transition-all">

    </div>

    <script>
        // ===== KONFIGURACE =====
        const CONFIG = {
            SERVER_URL: 'https://www.janbozek.cz/strateg2026/api_proxy.php',
            DATA_URL: 'https://www.janbozek.cz/strateg2026/save_data.php',
            REFRESH_INTERVAL: 60000, // 1 minuta
            RSI_PERIOD: 14
        };

        // ===== GLOBÁLNÍ STATE =====
        const WATCHLIST = [
            'MU', 'NOW', 'MSFT', 'ASML', 'ASM', 'SMCI', 'TSM', 'AVGO',
            'APLD', 'NBIS', 'PLTR', 'IONQ', 'RKLB', 'LUNR', 'OKLO',
            'ISRG', 'TSLA', 'BEAM', 'MELI', 'AFRM', 'UPST', 'CRWD',
            'APP', 'SNOW', 'NU', 'TTD', 'NET', 'GRAB', 'ADBE', 'ADYEN',
            'DUOL', 'MQ', 'DAVE', 'BKKT', 'FOUR', 'FLYW', 'TOST', 'ALE',
            'GEN', 'EVD', 'HOOD', 'LMND', 'COIN', 'SPPW', 'CEZ'
        ];
        
        const DEFAULT_PORTFOLIO = WATCHLIST.reduce((acc, sym) => {
            acc[sym] = { avg: sym === 'MU' ? 407.57 : 0, shares: sym === 'MU' ? 2.2623 : 0 };
            return acc;
        }, {});

        let myData = { ...DEFAULT_PORTFOLIO };
        
        let livePrices = {};
        let isLoading = false;
        let refreshInterval = null;
        let viewMode = 'table'; // 'table' nebo 'cards'
        let sortBy = 'colorRank'; // 'colorRank', 'symbol', 'change', 'rsi'
        let sortOrder = 'desc'; // 'asc' nebo 'desc'
        let stocksData = [];
        let selectedSymbol = null;

        // ===== UTILITY FUNKCE =====
        function showError(message) {
            const errorContainer = document.getElementById('error-container');
            const errorMessage = document.getElementById('error-message');
            errorMessage.textContent = message;
            errorContainer.classList.remove('hidden');
            errorContainer.classList.add('error-shake');
            setTimeout(() => errorContainer.classList.remove('error-shake'), 500);
            
            setTimeout(() => {
                errorContainer.classList.add('hidden');
            }, 5000);
        }

        function updateClock() {
            const now = new Date();
            const timeString = now.toLocaleTimeString('cs-CZ', { 
                hour: '2-digit', 
                minute: '2-digit', 
                second: '2-digit' 
            });
            document.getElementById('live-clock').textContent = timeString;
        }

        function setLoadingState(loading) {
            isLoading = loading;
            const verdictText = document.getElementById('verdict-text');
            if (loading) {
                verdictText.innerHTML = '<div class="flex items-center gap-2"><div class="loading-spinner"></div><span>Aktualizujem data...</span></div>';
            }
        }

        function parseLocaleNumber(value) {
            if (value === null || value === undefined) return NaN;
            const normalized = String(value).trim().replace(/\s+/g, '').replace(',', '.');
            return parseFloat(normalized);
        }

        function normalizePortfolioData(data) {
            const normalized = { ...DEFAULT_PORTFOLIO };
            if (!data || typeof data !== 'object') return normalized;

            for (const symbol of WATCHLIST) {
                const src = data[symbol];
                if (!src) continue;
                const avg = Number(src.avg);
                const shares = Number(src.shares);
                normalized[symbol] = {
                    avg: Number.isFinite(avg) && avg >= 0 ? avg : 0,
                    shares: Number.isFinite(shares) && shares >= 0 ? shares : 0
                };
            }

            return normalized;
        }

        function populateTickerSelects() {
            const editTicker = document.getElementById('edit-ticker');
            const simTicker = document.getElementById('sim-ticker');

            editTicker.innerHTML = WATCHLIST
                .map(symbol => `<option value="${symbol}">${symbol}</option>`)
                .join('');

            simTicker.innerHTML = WATCHLIST
                .map(symbol => `<option value="${symbol}">${getStockName(symbol)} (${symbol})</option>`)
                .join('');

            editTicker.value = 'MU';
            simTicker.value = 'MU';
            document.getElementById('watchlist-count').textContent = String(WATCHLIST.length);
        }

        function updateSyncStatus(online, message = '') {
            const indicator = document.getElementById('sync-indicator');
            const status = document.getElementById('sync-status');
            
            if (online) {
                indicator.className = 'w-2 h-2 rounded-full bg-emerald-500 status-online';
                status.textContent = message || 'Online ✓';
                status.className = 'text-[8px] font-black text-emerald-500 uppercase';
            } else {
                indicator.className = 'w-2 h-2 rounded-full bg-red-500';
                status.textContent = message || 'Offline';
                status.className = 'text-[8px] font-black text-red-500 uppercase';
            }
        }

        // ===== RSI VÝPOČET =====
        function calculateRSI(prices, period = 14) {
            if (prices.length < period + 1) return 50; // Fallback
            
            let gains = 0;
            let losses = 0;
            
            // První průměr
            for (let i = 1; i <= period; i++) {
                const change = prices[i] - prices[i - 1];
                if (change > 0) gains += change;
                else losses += Math.abs(change);
            }
            
            let avgGain = gains / period;
            let avgLoss = losses / period;
            
            // Smoothing pro zbytek
            for (let i = period + 1; i < prices.length; i++) {
                const change = prices[i] - prices[i - 1];
                if (change > 0) {
                    avgGain = (avgGain * (period - 1) + change) / period;
                    avgLoss = (avgLoss * (period - 1)) / period;
                } else {
                    avgGain = (avgGain * (period - 1)) / period;
                    avgLoss = (avgLoss * (period - 1) + Math.abs(change)) / period;
                }
            }
            
            if (avgLoss === 0) return 100;
            const rs = avgGain / avgLoss;
            const rsi = 100 - (100 / (1 + rs));
            
            return Math.round(rsi);
        }

        // ===== COLOR RANK ALGORITMUS =====
        function calculateColorRank(stockData) {
            let score = 50; // Základní skóre
            
            // RSI váha 30% (přeprodané = buy = +15, překoupené = sell = -15)
            if (stockData.rsi !== null) {
                if (stockData.rsi < 30) score += 15;
                else if (stockData.rsi >= 30 && stockData.rsi < 40) score += 10;
                else if (stockData.rsi > 70) score -= 15;
                else if (stockData.rsi > 60 && stockData.rsi <= 70) score -= 10;
            }
            
            // Změna % dne - váha 20% (růst = pozitivní)
            if (stockData.change !== undefined) {
                if (stockData.change > 5) score += 10;
                else if (stockData.change > 2) score += 5;
                else if (stockData.change < -5) score -= 10;
                else if (stockData.change < -2) score -= 5;
            }
            
            // P/E ratio - váha 20% (nízké jsou lepší)
            if (stockData.pe > 0) {
                if (stockData.pe < 15) score += 10;
                else if (stockData.pe < 25) score += 5;
                else if (stockData.pe > 50) score -= 10;
                else if (stockData.pe > 35) score -= 5;
            }
            
            // PEG ratio - váha 15% (< 1 je ideální)
            if (stockData.peg > 0) {
                if (stockData.peg < 1) score += 8;
                else if (stockData.peg < 1.5) score += 4;
                else if (stockData.peg > 3) score -= 8;
                else if (stockData.peg > 2) score -= 4;
            }
            
            // Momentum (price vs 52W range) - váha 15%
            if (stockData.high52 && stockData.low52 && stockData.price) {
                const range = stockData.high52 - stockData.low52;
                if (range > 0) {
                    const position = (stockData.price - stockData.low52) / range;
                    if (position < 0.3) score += 7; // Blízko 52W low = buy
                    else if (position > 0.85) score -= 7; // Blízko 52W high = opatrně
                }
            }
            
            return Math.max(0, Math.min(100, Math.round(score)));
        }
        
        function getColorForRank(rank) {
            if (rank >= 80) return { emoji: '🟢', text: 'Silný buy', color: 'emerald', bg: 'bg-emerald-500/10', border: 'border-emerald-500/30' };
            if (rank >= 60) return { emoji: '🟡', text: 'Neutrální', color: 'yellow', bg: 'bg-yellow-500/10', border: 'border-yellow-500/30' };
            if (rank >= 40) return { emoji: '🟠', text: 'Hold', color: 'orange', bg: 'bg-orange-500/10', border: 'border-orange-500/30' };
            if (rank >= 20) return { emoji: '🔴', text: 'Sell signál', color: 'red', bg: 'bg-red-500/10', border: 'border-red-500/30' };
            return { emoji: '🟣', text: 'Vysoké riziko', color: 'purple', bg: 'bg-purple-500/10', border: 'border-purple-500/30' };
        }

        // ===== API KOMUNIKACE =====
        async function fetchStockData(ticker) {
            try {
                // Získání historických dat pro RSI (60 dní)
                const historyResponse = await fetch(
                    `${CONFIG.SERVER_URL}?action=candles&symbol=${ticker}&resolution=D&count=60`
                );
                
                if (!historyResponse.ok) throw new Error(`HTTP ${historyResponse.status}`);
                
                const historyData = await historyResponse.json();
                
                // Získání aktuální ceny a metrik
                const [quoteRes, metricsRes] = await Promise.all([
                    fetch(`${CONFIG.SERVER_URL}?action=quote&symbol=${ticker}`),
                    fetch(`${CONFIG.SERVER_URL}?action=metrics&symbol=${ticker}`)
                ]);
                
                if (!quoteRes.ok || !metricsRes.ok) {
                    throw new Error('Chyba při načítání dat');
                }
                
                const quote = await quoteRes.json();
                const metrics = await metricsRes.json();
                const metric = metrics.metric || {};
                
                // Výpočet RSI z historických dat
                let rsi = null; // null znamená nedostupné data
                if (historyData.s === 'ok' && historyData.c && historyData.c.length > 0) {
                    rsi = calculateRSI(historyData.c, CONFIG.RSI_PERIOD);
                }

                const rawHigh52 = Number(metric['52WeekHigh'] ?? metric['52WHigh'] ?? 0);
                const rawLow52 = Number(metric['52WeekLow'] ?? metric['52WLow'] ?? 0);
                const high52 = Number.isFinite(rawHigh52) && rawHigh52 > 0 ? rawHigh52 : (quote.h || 0);
                const low52 = Number.isFinite(rawLow52) && rawLow52 > 0 ? rawLow52 : (quote.l || 0);
                const pe = Number(metric.peBasicExclExtraTTM || metric.peTTM || 0);
                const eps = Number(metric.epsBasicExclExtraItemsTTM || metric.epsTTM || 0);

                const stockData = {
                    symbol: ticker,
                    price: quote.c || 0,
                    change: quote.dp || 0,
                    open: quote.o || 0,
                    prevClose: quote.pc || 0,
                    high52,
                    low52,
                    pe,
                    peg: pe > 0 ? (pe / 20) : 0,
                    eps,
                    marketCap: Number(metric.marketCapitalization || 0),
                    beta: Number(metric.beta || 0),
                    targetPrice: Number(metric.targetMeanPrice || metric.targetHigh || 0),
                    dividendYield: Number(metric.dividendYieldIndicatedAnnual || 0),
                    roe: Number(metric.roeTTM || 0),
                    roa: Number(metric.roaTTM || 0),
                    rsi: rsi
                };
                
                // Vypočítat Color Rank
                stockData.colorRank = calculateColorRank(stockData);
                stockData.colorInfo = getColorForRank(stockData.colorRank);
                
                return stockData;
                
            } catch (error) {
                console.error(`Chyba pro ${ticker}:`, error);
                throw error;
            }
        }

        async function loadFromServer() {
            try {
                const response = await fetch(CONFIG.DATA_URL);
                if (!response.ok) throw new Error('Server nedostupný');
                
                const data = await response.json();
                if (data && Object.keys(data).length > 0) {
                    myData = normalizePortfolioData(data);
                    updateSyncStatus(true, 'Synchronizováno');
                }
            } catch (error) {
                console.error("Load error:", error);
                updateSyncStatus(false, 'Sync selhala');
            }
        }

        async function saveToServer() {
            try {
                const response = await fetch(CONFIG.DATA_URL, {
                    method: 'POST',
                    body: JSON.stringify(myData),
                    headers: { 'Content-Type': 'application/json' }
                });

        function renderVerdict(results) {
            const verdictEl = document.getElementById('verdict-text');
            
            // Filtruj pouze akcie s dostupným RSI
            const validResults = results.filter(r => r.rsi !== null);
            
            if (validResults.length === 0) {
                verdictEl.innerHTML = '<span class="text-zinc-500">Čekání na data... RSI není ještě dostupné pro všechny akcie.</span>';
                return;
            }
            
            // Najdi nejextrémnější RSI
            const extremeRSI = validResults.reduce((prev, curr) => {
                const prevDist = Math.min(prev.rsi, 100 - prev.rsi);
                const currDist = Math.min(curr.rsi, 100 - curr.rsi);
                return currDist < prevDist ? curr : prev;
            });
            
            let verdict = '';
            
            if (extremeRSI.rsi <= 25) {
                verdict = `<span class="text-emerald-400 font-black">🎯 SILNÝ NÁKUPNÍ SIGNÁL:</span> ${extremeRSI.symbol} má RSI ${Math.round(extremeRSI.rsi)}! Extrémně přeprodáno.`;
            } else if (extremeRSI.rsi <= 35) {
                verdict = `<span class="text-emerald-400 font-black">📈 NÁKUPNÍ PŘÍLEŽITOST:</span> ${extremeRSI.symbol} s RSI ${Math.round(extremeRSI.rsi)} ukazuje přeprodání.`;
            } else if (extremeRSI.rsi >= 75) {
                verdict = `<span class="text-red-400 font-black">⚠️ PŘEPRODÁNO:</span> ${extremeRSI.symbol} má RSI ${Math.round(extremeRSI.rsi)}. Zvažte profit-taking.`;
            } else if (extremeRSI.rsi >= 65) {
                verdict = `<span class="text-yellow-400 font-black">⚡ OPATRNĚ:</span> ${extremeRSI.symbol} s RSI ${Math.round(extremeRSI.rsi)} vstupuje do překoupeného pásma.`;
            } else {
                const avgRSI = Math.round(validResults.reduce((sum, s) => sum + s.rsi, 0) / validResults.length);
                verdict = `<span class="text-blue-400 font-black">✓ NEUTRÁLNÍ TRH:</span> Průměrné RSI ${avgRSI}. Čekáme na signál.`;
            }

            const myPositions = results
                .map(stock => {
                    const position = myData[stock.symbol] || { avg: 0, shares: 0 };
                    const invested = position.avg * position.shares;
                    const currentValue = stock.price * position.shares;
                    const pnlValue = currentValue - invested;

                    return {
                        symbol: stock.symbol,
                        shares: position.shares,
                        avg: position.avg,
                        price: stock.price,
                        invested,
                        currentValue,
                        pnlValue,
                        pnlPct: position.avg > 0 ? ((stock.price - position.avg) / position.avg) * 100 : 0
                    };
                })
                .filter(p => p.shares > 0);

            if (myPositions.length > 0) {
                const primary = myPositions.sort((a, b) => Math.abs(b.pnlValue) - Math.abs(a.pnlValue))[0];
                const pnlClass = primary.pnlValue >= 0 ? 'text-emerald-400' : 'text-red-400';
                const pnlPrefix = primary.pnlValue >= 0 ? '+' : '';

                verdict += `
                    <div class="mt-4 p-3 rounded-xl bg-white/5 border border-white/10 text-xs">
                        <div class="text-zinc-300 mb-1"><span class="font-black text-white">Moje pozice ${primary.symbol}:</span> ${primary.shares.toFixed(4)} ks, průměr $${primary.avg.toFixed(2)}, aktuálně $${primary.price.toFixed(2)}</div>
                        <div class="text-zinc-400">Investováno: <span class="text-white font-black">$${primary.invested.toFixed(2)}</span> | Aktuální hodnota: <span class="text-white font-black">$${primary.currentValue.toFixed(2)}</span></div>
                        <div class="${pnlClass} font-black">Výsledek: ${pnlPrefix}$${primary.pnlValue.toFixed(2)} (${pnlPrefix}${primary.pnlPct.toFixed(2)}%)</div>
                    </div>
                `;
            }
            
            verdictEl.innerHTML = verdict;
        }

            if (num >= 1e9) return `${(num / 1e9).toFixed(2)} mld.`;
            if (num >= 1e6) return `${(num / 1e6).toFixed(2)} mil.`;

        function buildCzechInsight(stock, position) {
            const points = [];
            const upside = stock.targetPrice > 0
                ? ((stock.targetPrice - stock.price) / stock.price) * 100
                : null;

            if (stock.rsi !== null) {
                if (stock.rsi <= 30) points.push(`Technicky přeprodané (RSI ${Math.round(stock.rsi)}), možnost odrazu.`);
                else if (stock.rsi >= 70) points.push(`Technicky překoupené (RSI ${Math.round(stock.rsi)}), vyšší krátkodobé riziko korekce.`);
                else points.push(`RSI ${Math.round(stock.rsi)} je v neutrálním pásmu.`);
            }

            if (stock.pe > 0) {
                if (stock.pe <= 20) points.push(`Valuace působí rozumně (P/E ${stock.pe.toFixed(2)}).`);
                else if (stock.pe >= 40) points.push(`Valuace je napjatá (P/E ${stock.pe.toFixed(2)}), počítejte s vyšší volatilitou.`);
                else points.push(`Valuace je střední (P/E ${stock.pe.toFixed(2)}).`);
            }

            if (upside !== null) {
                if (upside >= 20) points.push(`Analytický cíl implikuje potenciál růstu cca ${upside.toFixed(1)}%.`);
                else if (upside <= -10) points.push(`Analytický cíl je pod aktuální cenou (${upside.toFixed(1)}%).`);
            }

            if (position && position.shares > 0) {
                const pnlValue = (stock.price - position.avg) * position.shares;
                points.push(`Vaše pozice: ${pnlValue >= 0 ? '+' : ''}${pnlValue.toFixed(2)} USD při ${position.shares.toFixed(4)} ks.`);
            }

            return points.slice(0, 4);
        }

        async function updateTerminal() {
            if (isLoading) return;
            
            setLoadingState(true);
            updateClock();
            
            stocksData = [];
            let failedCount = 0;
            
            for (const ticker of WATCHLIST) {
                try {
                    const data = await fetchStockData(ticker);
                    livePrices[ticker] = data.price;
                    stocksData.push(data);
                    
                } catch (error) {
                    console.error(`Chyba pro ${ticker}:`, error);
                    failedCount++;
                }
            }
            
            if (failedCount === WATCHLIST.length) {
                showError('Nepodařilo se načíst žádná data. Zkontrolujte připojení.');
                updateSyncStatus(false, 'API Error');
            } else if (failedCount > 0) {
                showError(`Nepodařilo se načíst ${failedCount} z ${WATCHLIST.length} akcií.`);
            }
            
            if (stocksData.length > 0) {
                renderUI();
                renderVerdict(stocksData);

                if (selectedSymbol && stocksData.some(s => s.symbol === selectedSymbol)) {
                    showStockDetail(selectedSymbol);
                } else {
                    const firstHeld = stocksData.find(s => (myData[s.symbol]?.shares || 0) > 0);
                    if (firstHeld) showStockDetail(firstHeld.symbol);
                }

                updateSyncStatus(true, 'Aktualizováno');
            }
            
            setLoadingState(false);
        }

        // ===== USER ACTIONS =====
        function saveMyData() {
            const ticker = document.getElementById('edit-ticker').value;
            const avg = parseLocaleNumber(document.getElementById('edit-avg').value);
            const shares = parseLocaleNumber(document.getElementById('edit-shares').value);
            
            if (isNaN(avg) || isNaN(shares)) {
                showError('Zadejte platná čísla!');
                return;
            }
            
            if (avg < 0 || shares < 0) {
                showError('Hodnoty nemohou být záporné!');
                return;
            }
            
            myData[ticker] = { avg, shares };
            updateTerminal();
            saveToServer();
            
            // Clear inputs
            document.getElementById('edit-avg').value = '';
            document.getElementById('edit-shares').value = '';
        }

        function runProSimulation() {
            const ticker = document.getElementById('sim-ticker').value;
            const amount = parseLocaleNumber(document.getElementById('sim-amount').value);
            const output = document.getElementById('sim-output');
            
            if (isNaN(amount) || amount <= 0) {
                showError('Zadejte platnou částku pro simulaci!');
                return;
            }
            
            const price = livePrices[ticker];
            if (!price) {
                showError('Nejprve načtěte aktuální ceny!');
                return;
            }
            
            const current = myData[ticker];
            const newShares = amount / price;
            const totalShares = current.shares + newShares;
            const newAvg = current.shares > 0 
                ? ((current.shares * current.avg) + amount) / totalShares 
                : price;
            
            const breakEvenChange = (((newAvg - price) / price) * 100);
            const breakEvenPrice = newAvg;
            
            output.innerHTML = `
                <div class="space-y-4">
                    <div class="flex justify-between items-center pb-3 border-b border-white/10">
                        <span class="font-bold text-zinc-400">Nová průměrka:</span>
                        <span class="text-white font-black text-lg">$${newAvg.toFixed(2)}</span>
                    </div>
                    <div class="flex justify-between items-center pb-3 border-b border-white/10">
                        <span class="font-bold text-zinc-400">Nových kusů:</span>
                        <span class="text-white font-black">+${newShares.toFixed(4)}</span>
                    </div>
                    <div class="flex justify-between items-center pb-3 border-b border-white/10">
                        <span class="font-bold text-zinc-400">Celkem kusů:</span>
                        <span class="text-white font-black">${totalShares.toFixed(4)}</span>
                    </div>
                    <div class="bg-blue-500/20 p-4 rounded-lg">
                        <p class="text-emerald-400 font-bold mb-2 italic uppercase text-[10px]">🎯 Break-Even Target</p>
                        <p class="text-zinc-300 text-xs">
                            Trh musí ${breakEvenChange > 0 ? 'vzrůst' : 'klesnout'} o 
                            <span class="text-white font-black text-base">${Math.abs(breakEvenChange).toFixed(2)}%</span> 
                            na cenu <span class="text-emerald-400 font-black">$${breakEvenPrice.toFixed(2)}</span>
                        </p>
                    </div>
                </div>
            `;
            output.classList.remove('hidden');
        }

        function forceRefresh() {
            updateTerminal();
        }

        // ===== INITIALIZATION =====
        async function init() {
            updateClock();
            setInterval(updateClock, 1000);
            populateTickerSelects();
            
            await loadFromServer();
            await updateTerminal();
            
            // Auto-refresh každou minutu
            refreshInterval = setInterval(updateTerminal, CONFIG.REFRESH_INTERVAL);
        }

        // Spuštění při načtení stránky
        window.addEventListener('load', init);
        
        // Cleanup při zavření
        window.addEventListener('beforeunload', () => {
            if (refreshInterval) clearInterval(refreshInterval);
        });
    </script>
</body>
</html>
